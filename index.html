<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptBloom</title>
  <link rel="icon" type="image/png" href="z.png">
  <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="sidebar">
    <div class="logo">
      <img src="z.png" alt="PB Logo">
      <span>PromptBloom</span>
    </div>

   <nav>
      <a href="#" class="active" onclick="showMainSection('addPage')">➕ Add Prompt</a>
      <a href="#" onclick="showMainSection('savedPage')">📚 Saved Prompts</a>
      <a href="#" onclick="showMainSection('favoritesPage')">⭐ Favorites</a>
      <a href="#" onclick="showMainSection('searchPage')">🔎 Search</a>
    </nav>

     <div class="sidebar-bottom">
      <button onclick="exportPrompts()">⬇ Export</button>
      <label class="file-upload">📂 Import
        <input type="file" id="importFile" onchange="importPrompts()">
      </label>
    </div>

    </div>






  <script src="index.js"></script>
</body>
</html>
