<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptBloom</title>
  <link rel="icon" type="image/png" href="z.png">
  <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="sidebar">
    <div class="logo">
      <img src="z.png" alt="PB Logo">
      <span>PromptBloom</span>
    </div>

   <nav>
      <a href="#" class="active" onclick="showMainSection('addPage')">➕ Add Prompt</a>
      <a href="#" onclick="showMainSection('savedPage')">📚 Saved Prompts</a>
      <a href="#" onclick="showMainSection('favoritesPage')">⭐ Favorites</a>
      <a href="#" onclick="showMainSection('searchPage')">🔎 Search</a>
    </nav>

     <div class="sidebar-bottom">
      <button onclick="exportPrompts()">⬇ Export</button>
      <label class="file-upload">📂 Import
        <input type="file" id="importFile" onchange="importPrompts()">
      </label>
    </div>

    </div>

    <div class="container main">
    <h1>PromptBloom</h1>

    <div id="addPage" class="page">
      <h3>Add Prompt</h3>
        <input id="title" placeholder="Prompt title">
          <select id="category">
            <option>Coding</option>
            <option>Writing</option>
            <option>Marketing</option>
            <option>Design</option>
          </select>
      <textarea id="prompt" placeholder="Write your prompt"></textarea>
      <button onclick="addPrompt()">Save Prompt</button>
    </div>

    <div id="savedPage" class="page hidden">
      <h3>Saved Prompts</h3>
      <p id="countSaved"></p>
      <div id="promptListSaved"></div>
    </div>

    <div id="favoritesPage" class="page hidden">
      <h3>Favorites</h3>
      <div id="promptListFavorites"></div>
    </div>





  <script src="index.js"></script>
</body>
</html>
